<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>条码采集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--sub:#86868b;--border:#e5e5ea;
  --input-bg:#f5f5f7;--input-border:#d2d2d7;
  --primary:#007aff;--primary2:#5856d6;--ok:#34c759;--err:#ff3b30;--warn:#ff9500;
  --gradient:linear-gradient(135deg,#5856d6,#007aff)
}
@media(prefers-color-scheme:dark){
  :root{--bg:#000;--card:#1c1c1e;--text:#f5f5f7;--sub:#98989d;--border:#38383a;
    --input-bg:#2c2c2e;--input-border:#48484a}
}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;min-height:100vh;overflow-x:hidden}

/* 顶部渐变 */
.tb{background:var(--gradient);padding:20px 16px 24px;text-align:center;color:#fff;position:relative;z-index:1}
.tb .icon{font-size:32px;margin-bottom:2px}
.tb h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.tb .sub{font-size:12px;opacity:.8;margin-top:2px;font-weight:400}

main{max-width:500px;margin:0 auto;padding:0 14px;position:relative;z-index:2;margin-top:-8px}

/* 日志区域 */
.log-wrap{background:var(--card);border-radius:14px;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.04);overflow:hidden}
.log-hd{font-size:12px;font-weight:600;color:var(--sub);padding:10px 16px 6px;text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center}
.log-body{font-size:12px;padding:0 14px 10px;height:56px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.log-item{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.log-item:last-child{border-bottom:none}
.log-time{color:var(--sub);white-space:nowrap;opacity:.6;min-width:62px;text-align:right;font-variant-numeric:tabular-nums}
.log-msg{color:var(--text);word-break:break-all;line-height:1.4}
.log-body::-webkit-scrollbar{width:3px}
.log-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Token 重置条 */
#tk-reset-bar{text-align:center;margin-top:10px;margin-bottom:10px}
#tk-reset-bar .btn{width:100%}

/* 卡片 */
.c{background:var(--card);border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.ct{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px;color:var(--text)}
.ct i{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--primary)}

/* 输入框 */
input[type=password]{width:100%;padding:10px 14px;border:1.5px solid var(--input-border);border-radius:10px;font-size:14px;outline:none;background:var(--input-bg);color:var(--text);transition:all .15s;font-family:monospace}
input[type=password]:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,122,255,.12)}
textarea{width:100%;padding:10px 14px;border:1.5px solid var(--input-border);border-radius:10px;font-size:14px;outline:none;resize:vertical;font-family:'SF Mono',Monaco,monospace;line-height:1.7;min-height:100px;background:var(--input-bg);color:var(--text);transition:all .15s}
textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,122,255,.12)}

/* 按钮 */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:10px 18px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap;letter-spacing:-.1px}
.btn:active{transform:scale(.97);opacity:.9}
.btn-a{background:var(--gradient);color:#fff;flex:1}
.btn-b{background:var(--err);color:#fff}
.btn-c{border:1.5px solid var(--border);background:transparent;color:var(--text)}
.btn-d{border:1.5px solid var(--err);background:transparent;color:var(--err)}
.btn:disabled{opacity:.4;pointer-events:none}
.br{display:flex;gap:8px;margin-top:12px}

/* 进度条 */
.pw{margin-top:12px;display:none}
.pb{width:100%;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.pf{height:100%;background:var(--gradient);border-radius:3px;width:0%;transition:width .3s}
.pl{font-size:12px;color:var(--sub);margin-top:6px;text-align:center}

.info{margin-top:10px;font-size:13px;text-align:center;display:none}
.ok{color:var(--ok)}.er{color:var(--err)}

/* 统计 */
.st{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.si{text-align:center;padding:12px 4px;border-radius:12px;background:var(--input-bg)}
.si .v{font-size:24px;font-weight:700;letter-spacing:-.5px}
.si .l{font-size:11px;color:var(--sub);margin-top:2px}
.si.g .v{color:var(--ok)}.si.r .v{color:var(--err)}.si.y .v{color:var(--warn)}.si.n .v{color:var(--sub)}

/* Toast */
.tt{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.82);color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:500;z-index:999;display:none;backdrop-filter:blur(8px);pointer-events:none}

/* Token 行内样式 */
.tk-r{display:flex;gap:8px;align-items:center}
.tk-r input{flex:1}
</style>
</head>
<body>

<div class="tb">
  <div class="icon">&#128138;</div>
  <h1>条码采集</h1>
  <div class="sub">GitHub 实时同步</div>
</div>

<main>

<div class="log-wrap">
  <div class="log-hd">操作日志</div>
  <div class="log-body" id="log"><div class="log-item"><span class="log-time">--:--</span><span class="log-msg">等待操作...</span></div></div>
</div>

<!-- Token -->
<div class="c" id="tk-card">
  <div class="ct"><i></i>GitHub Token</div>
  <div class="tk-r">
    <input id="tk-in" type="password" placeholder="ghp_xxxxxxxxxxxx">
    <button class="btn btn-a" onclick="saveTk()" style="flex:none">保存</button>
  </div>
</div>

<!-- 条码输入 -->
<div class="c">
  <div class="ct"><i></i>条码输入</div>
  <textarea id="inp" placeholder="每行一个条码&#10;6978xxxx50073&#10;6923xxxx01644"></textarea>
  <div class="br">
    <button id="main-btn" class="btn btn-a" onclick="submit()">开始更新</button>
    <button class="btn btn-d" onclick="clearBarcodes()">清空</button>
  </div>
  <div class="pw" id="pw">
    <div class="pb"><div class="pf" id="pf"></div></div>
    <div class="pl" id="pl">等待扩展处理...</div>
  </div>
  <div class="info" id="msg"></div>
</div>

<!-- 统计 -->
<div class="c" id="stats-card" style="display:none">
  <div class="ct"><i></i>处理状态</div>
  <div class="st">
    <div class="si g"><div class="v" id="s-s">0</div><div class="l">成功</div></div>
    <div class="si n"><div class="v" id="s-n">0</div><div class="l">无商品</div></div>
    <div class="si r"><div class="v" id="s-f">0</div><div class="l">失败</div></div>
    <div class="si y"><div class="v" id="s-r">0</div><div class="l">剩余</div></div>
  </div>
</div>

<!-- 重置 Token 按钮 -->
<div id="tk-reset-bar" style="display:none;margin-bottom:24px">
  <button class="btn btn-c" onclick="resetTk()" style="width:100%">重置 Token</button>
</div>

</main>

<div class="tt" id="tst"></div>

<script>
var O='yjy-pgy',R='barcode-data',F='barcodes.json',C='control.json';
var pollTimer=null,total=0,totalKey='gh_total',remaining=0,isRunning=false,submittedCodes=[],submittedKey='gh_submitted',batchStartTime=0;

function $(i){return document.getElementById(i)}
function tk(){return localStorage.getItem('gh_token')||''}
function saveTk(){var t=$('tk-in').value.trim();if(!t)return toast('请输入 Token');localStorage.setItem('gh_token',t);$('tk-card').style.display='none';$('tk-reset-bar').style.display='block';toast('已保存');loadPend()}
function resetTk(){localStorage.removeItem('gh_token');$('tk-in').value='';$('tk-card').style.display='block';$('tk-reset-bar').style.display='none';clearSubmitted();isRunning=false;$('pw').style.display='none';$('stats-card').style.display='none';$('main-btn').textContent='开始更新';toast('已重置')}
function loadTotal(){return parseInt(localStorage.getItem(totalKey))||0}
function saveTotal(t){localStorage.setItem(totalKey,t)}
function loadSubmitted(){try{var s=localStorage.getItem(submittedKey);return s?JSON.parse(s):[]}catch(e){return[]}}
function saveSubmitted(codes){localStorage.setItem(submittedKey,JSON.stringify(codes))}
function clearSubmitted(){localStorage.removeItem(submittedKey);localStorage.removeItem(totalKey);batchStartTime=0}
function startNewBatch(){batchStartTime=Date.now()}
function toast(m,d){d=d||1800;var t=$('tst');t.textContent=m;t.style.display='block';setTimeout(function(){t.style.display='none'},d)}
function log(m){var c=$('log');var d=document.createElement('div');d.className='log-item';var now=new Date();var ts=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');d.innerHTML='<span class="log-time">'+ts+'</span><span class="log-msg">'+m+'</span>';c.appendChild(d);while(c.children.length>20)c.removeChild(c.firstChild);c.scrollTop=c.scrollHeight}
function msg(m,ok){var e=$('msg');e.style.display='block';e.textContent=m;e.className='info '+(ok?'ok':'er');setTimeout(function(){e.style.display='none'},3500)}

function api(p,o){var h={'Accept':'application/vnd.github.v3+json'},t=tk();if(t)h['Authorization']='token '+t;if(o&&o.h)for(var k in o.h)h[k]=o.h[k];return fetch('https://api.github.com/repos/'+O+'/'+R+'/contents/'+p+'?v='+Date.now(),{method:(o&&o.m)||'GET',headers:h,body:o&&o.b?JSON.stringify(o.b):undefined}).then(function(r){return r.json()})}
function parse(c){if(!c)return null;try{return JSON.parse(decodeURIComponent(escape(atob(c))))}catch(e){return null}}

function loadPend(){
  total=loadTotal();
  submittedCodes=loadSubmitted();
  if(submittedCodes.length>0)$('inp').value=submittedCodes.join('\n');
  api(F).then(function(f){
    var a=parse(f.content),n=Array.isArray(a)?a.length:0;
    remaining=n;$('s-r').textContent=n;$('stats-card').style.display='block';
    if(n>0)log(n+' 个条码等待处理');
    else if(submittedCodes.length>0&&total>0){$('inp').value='';log(total+' 个已全部完成');toast('全部完成')}
  }).catch(function(){total=loadTotal()})
}

function submit(){
  if(isRunning){stopUpdate();return}
  var t=tk();if(!t){toast('请先配置 Token');return}
  var inp=$('inp'),btn=$('main-btn'),txt=inp.value.trim();
  if(!txt){toast('请输入条码');return}
  var codes=[...new Set(txt.split(/[\n,\s]+/).map(function(s){return s.trim()}).filter(Boolean))];
  if(!codes.length)return toast('请输入有效条码');
  startNewBatch();
  btn.disabled=true;btn.textContent='提交中...';$('msg').style.display='none';
    api(F).then(function(f){
      var ex=parse(f.content);if(!Array.isArray(ex))ex=[];
      var nc=codes.filter(function(c){return ex.indexOf(c)===-1});
      ex.push.apply(ex,nc);
      return api(F,{m:'PUT',h:{'Authorization':'token '+t,'Content-Type':'application/json'},b:{message:'添加 '+nc.length+' 条',content:btoa(unescape(encodeURIComponent(JSON.stringify(ex,null,2)))),sha:f.sha}}).then(function(r){return{r:r,n:nc.length,t:codes.length,codes:codes}});
    }).then(function(d){
      if(d.r.content){submittedCodes=d.codes;saveSubmitted(submittedCodes);total=d.t;saveTotal(total);
        msg('已提交 '+d.t+' 条',true);startUpdate()}
      else{msg('提交失败',false);btn.disabled=false;btn.textContent='开始更新'}
    }).catch(function(e){msg('提交失败: '+e.message,false);btn.disabled=false;btn.textContent='开始更新'})
}

function startUpdate(){
  var t=tk();if(!t)return;
  var btn=$('main-btn');btn.textContent='停止';btn.disabled=false;
  $('pw').style.display='block';$('pf').style.width='0%';$('pl').textContent='等待扩展处理...';
  isRunning=true;log('已提交，等待处理...');
  doPut(C,btoa(unescape(encodeURIComponent(JSON.stringify({action:'resume',time:Date.now()})))));
  loadPend();startPoll();
}

function doPut(p,content){
  var tk_=tk(),h={'Authorization':'token '+tk_,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'};
  api(p).then(function(f){
    var sha=f.sha||'',body={message:'Resume',content:content};
    if(sha)body.sha=sha;
    return fetch('https://api.github.com/repos/'+O+'/'+R+'/contents/'+p+'?v='+Date.now(),{method:'PUT',headers:h,body:JSON.stringify(body)});
  }).then(function(r){return r.json()}).then(function(d){
    if(!d.sha&&!d.commit){log('重试通知...');return doPut(p,content)}
  }).catch(function(e){console.error(e)});
}

function stopUpdate(){
  if(pollTimer){clearInterval(pollTimer);pollTimer=null}
  isRunning=false;
  $('main-btn').textContent='开始更新';
  $('pw').style.display='none';log('已停止');toast('已停止');
}

function clearBarcodes(){
  var t=tk();if(!t)return toast('请先配置 Token');
  if(!$('inp').value.trim()&&(!submittedCodes||submittedCodes.length===0))return toast('当前无数据，无法操作');
  if(!confirm('确定清空所有任务吗？'))return;
  toast('清空中...');
  api(F).then(function(f){
    return api(F,{m:'PUT',h:{'Authorization':'token '+t,'Content-Type':'application/json'},b:{message:'清空',content:btoa(unescape(encodeURIComponent(JSON.stringify([])))),sha:f.sha}});
  }).then(function(){
    clearSubmitted();submittedCodes=[];total=0;saveTotal(0);
    $('inp').value='';$('s-r').textContent='0';log('已清空');toast('已清空');
  }).catch(function(){log('清空失败');toast('清空失败')});
}

function startPoll(){
  if(pollTimer)return;
  pollTimer=setInterval(function(){
    api(F).then(function(f){
      var a=parse(f.content);
      var currentCodes=(Array.isArray(a)?a:[]).map(function(c){return String(c).trim()});
      var n=currentCodes.length;remaining=n;$('s-r').textContent=n;$('stats-card').style.display='block';

      if(submittedCodes.length>0){
        var rc=submittedCodes.filter(function(c){return currentCodes.indexOf(c)!==-1});
        $('inp').value=rc.join('\n');
        if(rc.length!==submittedCodes.length){submittedCodes=rc;saveSubmitted(rc)}
      }

      if(total>0){
        var done=total-n,pct=Math.min(100,Math.round(done/total*100));
        $('pf').style.width=pct+'%';$('pl').textContent=done+'/'+total+' ('+pct+'%)';
        if(n===0){
          clearInterval(pollTimer);pollTimer=null;
          $('pf').style.width='100%';$('pl').textContent='全部完成 '+total+' 条';
          $('s-r').textContent='0';log('全部完成');toast('处理完成');
          $('main-btn').textContent='开始更新';
          $('pw').style.display='none';isRunning=false;saveTotal(0);total=0;
        }
      }else $('pl').textContent='等待扩展处理...';

      api('status.json').then(function(f){
        var r=parse(f.content),s=0,nn=0,fl=0,bt=batchStartTime||0;
        if(r&&r.barcodes){for(var k in r.barcodes){if(submittedCodes.length>0&&submittedCodes.indexOf(k)===-1)continue;var v=r.barcodes[k];if(bt&&(!v.time||v.time<bt))continue;var st=v.status;if(st==='success')s++;else if(st==='noGoods')nn++;else if(st==='fail')fl++}}
        else if(r){var sk=['status','total','done','time'];for(var k in r){if(sk.indexOf(k)!==-1)continue;if(submittedCodes.length>0&&submittedCodes.indexOf(k)===-1)continue;var v=r[k];if(bt&&(!v.time||v.time<bt))continue;var st=v.status;if(st==='success')s++;else if(st==='noGoods')nn++;else if(st==='fail')fl++}}
        localStorage.setItem('gh_status',JSON.stringify({s:s,n:nn,f:fl,t:Date.now()}));
        $('s-s').textContent=s;$('s-n').textContent=nn;$('s-f').textContent=fl;
      }).catch(function(){try{var c=JSON.parse(localStorage.getItem('gh_status'));if(c){$('s-s').textContent=c.s;$('s-n').textContent=c.n;$('s-f').textContent=c.f}}catch(e){}});
    }).catch(function(){});
  },3000);
}

window.onload=function(){var s=tk();if(s){$('tk-in').value=s;$('tk-card').style.display='none';$('tk-reset-bar').style.display='block';loadPend()}}
</script>
</body>
</html>
