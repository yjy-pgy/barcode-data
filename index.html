<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>条码采集</title>
<style>
:root{--bg:#f5f6fa;--card:#fff;--text:#333;--sub:#999;--border:#e8e8e8;--border2:#f0f0f0;--input-bg:#fff;--input-border:#e0e0e0;--stats-bg:#f8f9ff;--primary:#667eea;--primary2:#764ba2;--success:#2dc76e;--error:#f5576c;--nogoods:#999}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a2e;--card:#252540;--text:#e0e0e0;--sub:#888;--border:#3a3a5c;--border2:#333355;--input-bg:#2a2a4a;--input-border:#3a3a5c;--stats-bg:#1e1e3a}}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
.header{padding:14px 18px;font-size:15px;font-weight:600;background:linear-gradient(135deg,var(--primary) 0%,var(--primary2) 100%);color:#fff;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:10}
.header .sub{font-size:11px;opacity:.7;margin-left:auto}
.stats{padding:10px 18px;background:var(--stats-bg);border-bottom:1px solid var(--border2);font-size:12px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px}
.stats span{padding:3px 10px;border-radius:4px;white-space:nowrap}
.stats .s-total{background:rgba(0,0,0,0.04)}
.stats .s-success{background:rgba(67,233,123,0.1);color:var(--success)}
.stats .s-remaining{background:rgba(102,126,234,0.1);color:var(--primary)}
.stats .s-nogoods{background:rgba(153,153,153,0.1);color:var(--nogoods)}
.stats .s-fail{background:rgba(245,87,108,0.1);color:var(--error)}
@media(prefers-color-scheme:dark){.stats .s-total{background:rgba(255,255,255,0.06)}.stats .s-success{background:rgba(67,233,123,0.15)}.stats .s-remaining{background:rgba(102,126,234,0.15)}.stats .s-nogoods{background:rgba(153,153,153,0.15)}.stats .s-fail{background:rgba(245,87,108,0.15)}}
.log{padding:6px 18px;font-size:11px;color:var(--sub);border-bottom:1px solid var(--border2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.section{padding:16px 18px;border-bottom:1px solid var(--border2)}
.section-title{font-size:12px;color:var(--sub);margin-bottom:6px}
textarea{width:100%;padding:8px 10px;border:1px solid var(--input-border);border-radius:6px;font-size:13px;outline:none;box-sizing:border-box;resize:vertical;font-family:monospace;line-height:1.6;background:var(--input-bg);color:var(--text);transition:border-color .2s,box-shadow .2s}
textarea:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(102,126,234,0.15)}
input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;outline:none;box-sizing:border-box;background:var(--input-bg);color:var(--text);transition:border-color .2s}
input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(102,126,234,0.12)}
.btn-row{display:flex;gap:8px;margin-top:8px}
.btn{flex:1;padding:7px 0;border:none;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn:active{opacity:.8;transform:scale(.98)}
.btn-primary{background:linear-gradient(135deg,var(--primary) 0%,var(--primary2) 100%);color:#fff}
.btn-outline{border:1px solid var(--error);background:var(--card);color:var(--error)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.info{margin-top:8px;font-size:12px;display:none}
.info-ok{color:var(--success)}
.info-err{color:var(--error)}
/* 进度条 */
.progress-wrap{margin-top:8px;display:none}
.progress-track{width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary2));border-radius:2px;width:30%;animation:slide 1.2s ease-in-out infinite}
@keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
.progress-label{font-size:11px;color:var(--sub);margin-top:4px;text-align:center}
/* 表格 */
.table-header{padding:10px 18px;display:flex;justify-content:space-between;align-items:center}
.table-header span{font-size:12px;color:#666}
.table-header button{padding:4px 12px;border:1px solid var(--error);border-radius:4px;background:var(--card);color:var(--error);cursor:pointer;font-size:12px}
.table-wrap{height:300px;overflow:auto;border-top:1px solid var(--border2)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:var(--stats-bg);position:sticky;top:0;z-index:1}
th{padding:8px 6px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 6px;white-space:nowrap;border-bottom:1px solid var(--border2)}
td.name{max-width:160px;overflow:hidden;text-overflow:ellipsis}
td.barcode{font-family:monospace}
td.cat{max-width:80px;overflow:hidden;text-overflow:ellipsis}
td.status-ok{color:var(--success)}
td.status-fail{color:var(--error)}
td.status-nogoods{color:var(--nogoods)}
.empty{text-align:center;padding:20px;color:var(--sub)}
/* Token卡片 */
.token-section{padding:16px 18px}
.token-section label{font-size:12px;color:var(--sub);margin-bottom:4px;display:block}
.token-row{display:flex;gap:8px;margin-top:8px}
.token-row input{flex:1}
.token-row .btn{flex:0 0 auto;padding:7px 16px}
.hint{font-size:11px;color:var(--sub);margin-top:6px;text-align:center}
.hidden{display:none!important}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#fff;padding:12px 28px;border-radius:10px;font-size:14px;z-index:999;display:none;backdrop-filter:blur(4px)}
/* 历史 */
.history-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border2)}
.history-item:last-child{border-bottom:none}
.history-left .hl-count{font-size:13px;color:var(--text)}
.history-left .hl-time{font-size:11px;color:var(--sub);margin-top:2px}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500}
.tag-new{background:rgba(102,126,234,0.1);color:var(--primary)}
.tag-dup{background:rgba(245,87,108,0.1);color:var(--error)}
</style>
</head>
<body>

<div class="header">
  <span style="font-size:18px">💊</span>
  <span>条码采集管理</span>
  <span class="sub">GitHub 同步</span>
</div>

<!-- 统计栏 -->
<div class="stats">
  <span class="s-total">待处理: <b id="stat-pending">0</b></span>
  <span class="s-success">已处理: <b id="stat-done">0</b></span>
  <span class="s-remaining">批次: <b id="stat-batch">0</b></span>
</div>
<div class="log" id="log-area">等待操作...</div>

<!-- Token 配置 -->
<div class="token-section" id="token-section">
  <label>GitHub Token</label>
  <div class="token-row">
    <input id="token-input" type="password" placeholder="ghp_xxxxxxxxxxxx">
    <button class="btn btn-primary" onclick="saveToken()">保存</button>
  </div>
  <div class="hint">首次使用需填写，之后自动保存</div>
</div>

<!-- 条码输入 -->
<div class="section" id="input-section">
  <div class="section-title">手动输入条形码（每行一个）</div>
  <textarea id="barcode-input" rows="4" placeholder="6978xxxx50073&#10;6923xxxx01644&#10;6976xxxx75042"></textarea>
  <div class="btn-row">
    <button id="submit-btn" class="btn btn-primary" onclick="submitBarcodes()">提交条码</button>
    <button class="btn btn-outline" onclick="clearInput()">清空条码</button>
  </div>
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-track"><div class="progress-fill"></div></div>
    <div class="progress-label" id="progress-label">提交中...</div>
  </div>
  <div class="info" id="info-msg"></div>
</div>

<!-- 数据表格 -->
<div class="table-header">
  <span>采集结果 <b id="table-count">0</b> 条</span>
  <button onclick="clearResults()">清空数据</button>
</div>
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:160px">商品名称</th>
        <th>条形码</th>
        <th style="width:80px">商品类目</th>
        <th>规格</th>
        <th style="position:sticky;right:0;background:var(--stats-bg);box-shadow:-2px 0 4px rgba(0,0,0,0.06)">备注</th>
      </tr>
    </thead>
    <tbody id="table-body">
      <tr><td colspan="5" class="empty">暂无数据</td></tr>
    </tbody>
  </table>
</div>

<!-- 历史记录 -->
<div class="section">
  <div class="section-title" style="margin-bottom:8px">提交历史</div>
  <div id="history-list"><div class="empty">暂无记录</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
var OWNER='yjy-pgy',REPO='barcode-data',FILE='barcodes.json';
var pollTimer=null,lastSubmittedCount=0;
var results=[];

function getToken(){return localStorage.getItem('gh_token')||''}
function saveToken(){
  var t=document.getElementById('token-input').value.trim();
  if(!t)return showToast('请输入 Token');
  localStorage.setItem('gh_token',t);
  showToast('Token 已保存');
  checkToken();
}
function checkToken(){
  var t=getToken();
  document.getElementById('token-section').classList[t?'add':'remove']('hidden');
  if(t)loadPendingCount();
}
function showToast(m,d){
  d=d||1500;var t=document.getElementById('toast');
  t.textContent=m;t.style.display='block';
  setTimeout(function(){t.style.display='none'},d);
}
function setLog(m){document.getElementById('log-area').textContent='['+new Date().toLocaleTimeString()+'] '+m}
function setInfo(m,ok){
  var el=document.getElementById('info-msg');
  el.style.display='block';el.textContent=m;
  el.className='info '+(ok?'info-ok':'info-err');
  setTimeout(function(){el.style.display='none'},4000);
}
function setProgress(show,text){
  var w=document.getElementById('progress-wrap');
  w.style.display=show?'block':'none';
  if(text)document.getElementById('progress-label').textContent=text;
}
function updateStats(){
  document.getElementById('table-count').textContent=results.length;
  document.getElementById('stat-batch').textContent=results.length;
}

// API
function ghFetch(path,opt){
  var token=getToken();
  var h={'Accept':'application/vnd.github.v3+json'};
  if(token)h['Authorization']='token '+token;
  if(opt&&opt.headers)Object.assign(h,opt.headers);
  return fetch('https://api.github.com/repos/'+OWNER+'/'+REPO+'/contents/'+path+'?t='+Date.now(),{
    method:(opt&&opt.method)||'GET',headers:h,body:opt&&opt.body?JSON.stringify(opt.body):undefined
  }).then(function(r){return r.json()});
}
function getFile(){
  return ghFetch(FILE).then(function(r){
    if(r.message&&r.message==='Not Found')return{content:'[]',sha:null};
    return r;
  });
}
function saveFile(content,sha,msg){
  var token=getToken();
  return ghFetch(FILE,{method:'PUT',headers:{
    'Authorization':'token '+token,'Content-Type':'application/json'
  },body:{message:msg,content:btoa(unescape(encodeURIComponent(content))),sha:sha}});
}
function parseContent(c){
  if(!c)return[];
  try{return JSON.parse(decodeURIComponent(escape(atob(c))))}catch(e){return[]}
}

// 加载待处理数
function loadPendingCount(){
  getFile().then(function(f){
    var arr=parseContent(f.content);
    document.getElementById('stat-pending').textContent=Array.isArray(arr)?arr.length:0;
    if(arr.length>0)setLog('队列中有 '+arr.length+' 个条码等待处理');
  }).catch(function(){});
}

// 提交
function submitBarcodes(){
  var token=getToken();
  if(!token){showToast('请先配置 Token');checkToken();return}
  var input=document.getElementById('barcode-input');
  var btn=document.getElementById('submit-btn');
  var text=input.value.trim();
  if(!text)return showToast('请输入条码');
  var codes=[...new Set(text.split(/[\n,\s]+/).map(function(s){return s.trim()}).filter(Boolean))];
  if(!codes.length)return showToast('请输入有效条码');

  btn.disabled=true;btn.textContent='提交中...';
  document.getElementById('info-msg').style.display='none';
  setProgress(true,'正在读取远程数据...');

  getFile().then(function(file){
    setProgress(true,'正在合并条码...');
    var existing=parseContent(file.content);
    if(!Array.isArray(existing))existing=[];
    var newCodes=codes.filter(function(c){return existing.indexOf(c)===-1});
    var dupCount=codes.length-newCodes.length;
    existing.push.apply(existing,newCodes);
    setProgress(true,'正在提交到 GitHub...');
    return saveFile(JSON.stringify(existing,null,2),file.sha,'添加 '+newCodes.length+' 个条码').then(function(r){
      return{result:r,newCount:newCodes.length,dupCount:dupCount,total:codes.length};
    });
  }).then(function(data){
    setProgress(false);
    if(data.result.content){
      lastSubmittedCount=data.newCount;
      var msg='提交成功！共 '+data.total+' 个条码';
      if(data.newCount>0)msg+=' | 新增 '+data.newCount;
      if(data.dupCount>0)msg+=' | 重复 '+data.dupCount;
      setInfo(msg,true);
      setLog('已提交 '+data.total+' 个条码（新增 '+data.newCount+'，重复 '+data.dupCount+'）');
      showToast('已提交 '+data.total+' 个条码');
      input.value='';
      saveHistory({count:data.total,newCount:data.newCount,dupCount:data.dupCount,time:new Date().toLocaleString('zh-CN')});
      startPolling();
      loadPendingCount();
    }else{
      setInfo('提交失败: '+(data.result.message||'未知错误'),false);
      setLog('提交失败');
    }
  }).catch(function(err){
    setProgress(false);
    setInfo('提交失败: '+err.message,false);
    setLog('提交失败: '+err.message);
  }).finally(function(){
    btn.disabled=false;btn.textContent='提交条码';
  });
}

// 轮询进度
function startPolling(){
  if(pollTimer)return;
  document.getElementById('stat-done').textContent='0';
  setLog('等待扩展处理...');
  var startTime=Date.now();
  pollTimer=setInterval(function(){
    getFile().then(function(f){
      var arr=parseContent(f.content);
      var remaining=Array.isArray(arr)?arr.length:0;
      var done=lastSubmittedCount-remaining;
      if(done>0)document.getElementById('stat-done').textContent=done;
      document.getElementById('stat-pending').textContent=remaining;
      if(remaining===0&&done>0){
        clearInterval(pollTimer);pollTimer=null;
        setLog('全部处理完成，共 '+lastSubmittedCount+' 个条码');
        showToast('处理完成');
      }
      if(Date.now()-startTime>600000){
        clearInterval(pollTimer);pollTimer=null;
        setLog('轮询超时，剩余 '+remaining+' 个未处理');
      }
    }).catch(function(){});
  },5000);
}

// 历史
function loadHistory(){try{return JSON.parse(localStorage.getItem('gh_history')||'[]')}catch(e){return[]}}
function saveHistory(item){
  var h=loadHistory();h.unshift(item);
  if(h.length>20)h=h.slice(0,20);
  localStorage.setItem('gh_history',JSON.stringify(h));
  renderHistory();
}
function renderHistory(){
  var h=loadHistory(),el=document.getElementById('history-list');
  if(!h.length){el.innerHTML='<div class="empty">暂无记录</div>';return}
  el.innerHTML=h.map(function(i){
    return '<div class="history-item"><div class="history-left"><div class="hl-count">'+i.count+' 个条码</div><div class="hl-time">'+i.time+'</div></div><div><span class="tag tag-new">新增 '+i.newCount+'</span>'+(i.dupCount>0?' <span class="tag tag-dup">重复 '+i.dupCount+'</span>':'')+'</div></div>';
  }).join('');
}

// 表格
function renderTable(){
  var tbody=document.getElementById('table-body');
  document.getElementById('table-count').textContent=results.length;
  if(!results.length){tbody.innerHTML='<tr><td colspan="5" class="empty">暂无数据</td></tr>';return}
  tbody.innerHTML=results.slice().reverse().map(function(r){
    var color=r.status==='success'?'var(--success)':r.status==='noGoods'?'var(--nogoods)':'var(--error)';
    var label=r.status==='success'?'成功':r.status==='noGoods'?'无商品':r.message||'失败';
    return '<tr><td class="name" title="'+(r.name||'-').replace(/"/g,'&quot;')+'">'+(r.name||'-')+'</td><td class="barcode">'+(r.barCode||'-')+'</td><td class="cat" title="'+(r.category||'-').replace(/"/g,'&quot;')+'">'+(r.category||'-')+'</td><td>'+(r.spec||'-')+'</td><td style="color:'+color+';position:sticky;right:0;background:var(--card);box-shadow:-2px 0 4px rgba(0,0,0,0.06)">'+label+'</td></tr>';
  }).join('');
}
function clearResults(){results=[];renderTable();setLog('数据已清空')}
function clearInput(){document.getElementById('barcode-input').value=''}

// 从 localStorage 加载结果（扩展可写入）
function loadResults(){
  try{var r=localStorage.getItem('gh_results');if(r)results=JSON.parse(r)}catch(e){}
  renderTable();
}

window.onload=function(){
  var saved=getToken();
  if(saved)document.getElementById('token-input').value=saved;
  checkToken();
  renderHistory();
  loadResults();
};
</script>
</body>
</html>
