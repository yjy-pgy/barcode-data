<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>条码采集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#f5f6fa;--card:#fff;--text:#333;--sub:#999;--border:#e8e8e8;--border2:#f0f0f0;--input-bg:#fff;--input-border:#e0e0e0;--stats-bg:#f8f9ff;--primary:#667eea;--primary2:#764ba2;--ok:#2dc76e;--err:#f5576c;--grey:#999;--shadow:0 2px 8px rgba(0,0,0,.06)}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a2e;--card:#252540;--text:#e0e0e0;--sub:#777;--border:#3a3a5c;--border2:#333355;--input-bg:#2a2a4a;--input-border:#3a3a5c;--stats-bg:#1e1e3a;--shadow:0 2px 8px rgba(0,0,0,.2)}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
.hdr{padding:14px 18px;font-size:15px;font-weight:600;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:10}
.stats{padding:10px 18px;background:var(--stats-bg);border-bottom:1px solid var(--border2);font-size:12px;display:flex;flex-wrap:wrap;gap:4px}
.stats i{font-style:normal;padding:3px 10px;border-radius:4px;white-space:nowrap}
.st{background:rgba(0,0,0,.04)}.ss{background:rgba(67,233,123,.1);color:var(--ok)}.sr{background:rgba(102,126,234,.1);color:var(--primary)}.sn{background:rgba(153,153,153,.1);color:var(--grey)}.sf{background:rgba(245,87,108,.1);color:var(--err)}
@media(prefers-color-scheme:dark){.st{background:rgba(255,255,255,.06)}.ss{background:rgba(67,233,123,.15)}.sr{background:rgba(102,126,234,.15)}.sn{background:rgba(153,153,153,.15)}.sf{background:rgba(245,87,108,.15)}}
.log{padding:6px 18px;font-size:11px;color:var(--sub);border-bottom:1px solid var(--border2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec{padding:16px 18px;border-bottom:1px solid var(--border2)}
.sec-t{font-size:12px;color:var(--sub);margin-bottom:6px}
textarea{width:100%;padding:8px 10px;border:1px solid var(--input-border);border-radius:6px;font-size:13px;outline:none;resize:vertical;font-family:monospace;line-height:1.6;background:var(--input-bg);color:var(--text)}
textarea:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(102,126,234,.15)}
input[type=text],input[type=password]{width:100%;padding:8px 10px;border:1px solid var(--input-border);border-radius:6px;font-size:13px;outline:none;background:var(--input-bg);color:var(--text)}
input:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(102,126,234,.15)}
.brow{display:flex;gap:8px;margin-top:8px}
.btn{flex:1;padding:7px 0;border:none;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;transition:all .12s}
.btn:active{opacity:.8;transform:scale(.98)}
.bp{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff}
.bstop{background:linear-gradient(135deg,#ff6b6b,#ee5a5a);color:#fff}
.bo{border:1px solid var(--err);background:var(--card);color:var(--err)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.info{margin-top:8px;font-size:12px;display:none}
.iok{color:var(--ok)}.ier{color:var(--err)}
.pw{margin-top:8px;display:none}
.pt{width:100%;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary2));border-radius:3px;width:0%;transition:width .3s}
.pl{font-size:11px;color:var(--sub);margin-top:4px;text-align:center}
.tk{padding:16px 18px;border-bottom:1px solid var(--border2)}
.tk label{font-size:12px;color:var(--sub);margin-bottom:6px;display:block}
.tr{display:flex;gap:8px;align-items:center}
.tr input{flex:1}
.tr .btn{flex:0 0 auto;padding:7px 16px}
.hint{font-size:11px;color:var(--sub);margin-top:6px;text-align:center}
.hd{display:none!important}
.tst{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#fff;padding:12px 28px;border-radius:10px;font-size:14px;z-index:999;display:none;backdrop-filter:blur(4px)}
</style>
</head>
<body>

<div class="hdr"><span style="font-size:18px">&#x1f48a;</span>条码采集管理<span style="font-size:11px;opacity:.7;margin-left:auto">GitHub 同步</span></div>

<div class="stats">
  <i class="st">总任务: <b id="s-t">0</b></i>
  <i class="ss">成功: <b id="s-s">0</b></i>
  <i class="sr">待处理: <b id="s-r">0</b></i>
  <i class="sn">无商品: <b id="s-n">0</b></i>
  <i class="sf">失败: <b id="s-f">0</b></i>
</div>
<div class="log" id="log">等待操作...</div>

<div class="tk" id="tk-sec">
  <label>GitHub Token</label>
  <div class="tr">
    <input id="tk-in" type="password" placeholder="ghp_xxxxxxxxxxxx">
    <button class="btn bp" onclick="saveTk()">保存</button>
  </div>
  <div class="hint">首次使用需填写，之后自动保存在本地</div>
</div>

<div class="sec">
  <div class="sec-t">手动输入条形码（每行一个）</div>
  <textarea id="inp" rows="4" placeholder="6978xxxx50073&#10;6923xxxx01644&#10;6976xxxx75042"></textarea>
  <div class="brow">
    <button id="main-btn" class="btn bp" onclick="submit()">开始更新</button>
    <button class="btn bo" onclick="$('inp').value=''">清空</button>
  </div>
  <div class="pw" id="pw"><div class="pt"><div class="pf" id="pf"></div></div><div class="pl" id="pl">等待开始...</div></div>
  <div class="info" id="msg"></div>
</div>

<div class="tst" id="tst"></div>

<script>
var O='yjy-pgy',R='barcode-data',F='barcodes.json',C='control.json';
var pollTimer=null,total=0,totalKey='gh_total',remaining=0,isRunning=false,submittedCodes=[],submittedKey='gh_submitted';

function $(i){return document.getElementById(i)}
function tk(){return localStorage.getItem('gh_token')||''}
function saveTk(){var t=$('tk-in').value.trim();if(!t)return toast('请输入Token');localStorage.setItem('gh_token',t);toast('Token已保存');chk()}
function loadTotal(){var t=parseInt(localStorage.getItem(totalKey))||0;return t}
function saveTotal(t){localStorage.setItem(totalKey,t)}
function loadSubmitted(){try{var s=localStorage.getItem(submittedKey);return s?JSON.parse(s):[]}catch(e){return[]}}
function saveSubmitted(codes){localStorage.setItem(submittedKey,JSON.stringify(codes))}
function clearSubmitted(){localStorage.removeItem(submittedKey);localStorage.removeItem(totalKey)}
function chk(){var t=tk();$('tk-sec').classList[t?'add':'remove']('hd');if(t)loadPend()}
function toast(m,d){d=d||1500;var t=$('tst');t.textContent=m;t.style.display='block';setTimeout(function(){t.style.display='none'},d)}
function log(m){$('log').textContent='['+new Date().toLocaleTimeString()+'] '+m}
function msg(m,ok){var e=$('msg');e.style.display='block';e.textContent=m;e.className='info '+(ok?'iok':'ier');setTimeout(function(){e.style.display='none'},4000)}

function api(p,o){var h={'Accept':'application/vnd.github.v3+json'},t=tk();if(t)h['Authorization']='token '+t;return fetch('https://api.github.com/repos/'+O+'/'+R+'/contents/'+p+'?v='+Date.now(),{method:(o&&o.m)||'GET',headers:h,body:o&&o.b?JSON.stringify(o.b):undefined}).then(function(r){return r.json()})}
function parse(c){if(!c)return null;try{return JSON.parse(decodeURIComponent(escape(atob(c))))}catch(e){return null}}

function loadPend(){
  total=loadTotal();
  submittedCodes=loadSubmitted();
  // 恢复输入框内容
  if(submittedCodes.length>0){
    $('inp').value=submittedCodes.join('\n');
  }
  api(F).then(function(f){
    var a=parse(f.content);
    var n=Array.isArray(a)?a.length:0;
    remaining=n;
    $('s-r').textContent=n;
    $('s-t').textContent=total>0?total:n;
    if(n>0)log('队列中有 '+n+' 个条码等待处理');
    else if(total>0){
      log('总任务 '+total+' 个，已处理 '+(total-n)+' 个');
      // 全部跑完，清除保存的条码
      if(n===0&&submittedCodes.length>0){
        clearSubmitted();
        submittedCodes=[];
        $('inp').value='';
        toast('全部处理完成');
      }
    }
  }).catch(function(){total=loadTotal()})
  
  api('status.json').then(function(f){
    var r=parse(f.content);
    var success=0,noGoods=0,fail=0;
    // 新格式：{ barcodes: { barcode: { status, message, time } } }
    if(r&&r.barcodes){
      for(var k in r.barcodes){
        var st=r.barcodes[k]?.status;
        if(st==='success')success++;
        else if(st==='noGoods')noGoods++;
        else if(st==='fail')fail++;
      }
    }else if(r){
      // 兼容旧格式：排除顶层字段（status, total, done, time）
      var skipKeys=['status','total','done','time'];
      for(var k in r){
        if(skipKeys.indexOf(k)!==-1)continue;
        var st=r[k]?.status;
        if(st==='success')success++;
        else if(st==='noGoods')noGoods++;
        else if(st==='fail')fail++;
      }
    }
    $('s-s').textContent=success;
    $('s-n').textContent=noGoods;
    $('s-f').textContent=fail;
  }).catch(function(){});
}

function submit(){
  if(isRunning){
    stopUpdate();
    return;
  }
  
  var t=tk();if(!t){toast('请先配置Token');chk();return}
  var inp=$('inp'),btn=$('main-btn'),txt=inp.value.trim();
  
  if(txt){
    var codes=[...new Set(txt.split(/[\n,\s]+/).map(function(s){return s.trim()}).filter(Boolean))];
    if(!codes.length)return toast('请输入有效条码');
    btn.disabled=true;btn.textContent='提交中...';$('msg').style.display='none';
    api(F).then(function(f){
      var ex=parse(f.content);if(!Array.isArray(ex))ex=[];
      var nc=codes.filter(function(c){return ex.indexOf(c)===-1});
      ex.push.apply(ex,nc);
      return api(F,{m:'PUT',h:{'Authorization':'token '+t,'Content-Type':'application/json'},b:{message:'添加 '+nc.length+' 个条码',content:btoa(unescape(encodeURIComponent(JSON.stringify(ex,null,2)))),sha:f.sha}}).then(function(r){return{r:r,n:nc.length,t:codes.length,codes:codes}});
    }).then(function(d){
      if(d.r.content){
        submittedCodes=d.codes;
        saveSubmitted(submittedCodes);
        msg('已提交 '+d.t+' 个条码',true);log('已提交 '+d.t+' 个条码');
        total=d.t;saveTotal(total);
        startUpdate();
      }else{msg('提交失败',false);btn.disabled=false;btn.textContent='开始更新'}
    }).catch(function(e){msg('提交失败: '+e.message,false);btn.disabled=false;btn.textContent='开始更新'})
  }else{
    startUpdate();
  }
}

function startUpdate(){
  var t=tk();if(!t){toast('请先配置Token');return}
  var btn=$('main-btn');
  btn.className='btn bstop';
  btn.textContent='停止更新';
  btn.disabled=false;
  $('pw').style.display='block';
  $('pf').style.width='0%';
  $('pl').textContent='等待扩展处理...';
  isRunning=true;
  log('等待扩展处理...');
  loadPend();
  startPoll();
}

function stopUpdate(){
  if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
  isRunning=false;
  // 不清空 submittedCodes，保留条码以便继续使用
  var btn=$('main-btn');
  btn.className='btn bp';
  btn.textContent='开始更新';
  $('pw').style.display='none';
  log('已停止轮询');
  
  var t=tk();
  api(C).then(function(f){
    if(f.sha){
      return api(C,{m:'PUT',h:{'Authorization':'token '+t,'Content-Type':'application/json'},b:{message:'Stop update',content:btoa(unescape(encodeURIComponent(JSON.stringify({action:'stop',time:Date.now()})))),sha:f.sha}});
    }else{
      return api(C,{m:'PUT',h:{'Authorization':'token '+t,'Content-Type':'application/json'},b:{message:'Stop update',content:btoa(unescape(encodeURIComponent(JSON.stringify({action:'stop',time:Date.now()}))))}});
    }
  }).catch(function(){
    return api(C,{m:'PUT',h:{'Authorization':'token '+t,'Content-Type':'application/json'},b:{message:'Stop update',content:btoa(unescape(encodeURIComponent(JSON.stringify({action:'stop',time:Date.now()}))))}});
  }).then(function(){
    log('已发送停止命令');
    toast('已发送停止命令');
  }).catch(function(){
    log('发送停止命令失败');
    toast('发送停止命令失败');
  });
}

function startPoll(){
  if(pollTimer)return;
  pollTimer=setInterval(function(){
    api(F).then(function(f){
      var a=parse(f.content);
      var currentCodes=(Array.isArray(a)?a:[]).map(function(c){return String(c).trim()});
      var n=currentCodes.length;
      remaining=n;
      $('s-r').textContent=n;
      
      if(submittedCodes.length>0){
        var remainingCodes=submittedCodes.filter(function(c){return currentCodes.indexOf(c)!==-1});
        $('inp').value=remainingCodes.join('\n');
        if(remainingCodes.length!==submittedCodes.length){
          submittedCodes=remainingCodes;
          saveSubmitted(submittedCodes);
        }
      }
      
      if(total>0){
        var done=total-n;
        var pct=Math.round(done/total*100);
        $('pf').style.width=pct+'%';
        $('pl').textContent='处理中 '+done+'/'+total+' ('+pct+'%)';
        log('处理中... ('+done+'/'+total+')');
        
        if(n===0){
          clearInterval(pollTimer);pollTimer=null;
          $('pf').style.width='100%';
          $('pl').textContent='已完成 '+total+' 个';
          $('s-s').textContent=total;
          $('s-r').textContent=0;
          log('全部处理完成');
          toast('处理完成');
          var btn=$('main-btn');
          btn.className='btn bp';
          btn.textContent='开始更新';
          $('pw').style.display='none';
          isRunning=false;
          clearSubmitted();
          submittedCodes=[];
          saveTotal(0);total=0;
        }
      }else{
        $('pl').textContent='等待扩展处理...';
      }
    }).catch(function(){});
    
    api('status.json').then(function(f){
      var r=parse(f.content);
      var success=0,noGoods=0,fail=0;
      // 新格式：{ barcodes: { barcode: { status, message, time } } }
      if(r&&r.barcodes){
        for(var k in r.barcodes){
          if(submittedCodes.length>0&&submittedCodes.indexOf(k)===-1)continue;
          var st=r.barcodes[k]?.status;
          if(st==='success')success++;
          else if(st==='noGoods')noGoods++;
          else if(st==='fail')fail++;
        }
      }else if(r){
        // 兼容旧格式：排除顶层字段
        var skipKeys=['status','total','done','time'];
        for(var k in r){
          if(skipKeys.indexOf(k)!==-1)continue;
          if(submittedCodes.length>0&&submittedCodes.indexOf(k)===-1)continue;
          var st=r[k]?.status;
          if(st==='success')success++;
          else if(st==='noGoods')noGoods++;
          else if(st==='fail')fail++;
        }
      }
      $('s-s').textContent=success;
      $('s-n').textContent=noGoods;
      $('s-f').textContent=fail;
    }).catch(function(){});
  },3000);
}

window.onload=function(){
  var s=tk();if(s)$('tk-in').value=s;chk();
}
</script>
</body>
</html>
